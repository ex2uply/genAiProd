name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-lab1:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./lab1
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Lab 1 tests
      working-directory: ./lab1
      run: |
        python -m pytest tests -v
    
    - name: Run Lab 1 pipeline
      working-directory: ./lab1
      run: |
        python pipeline.py
        ls -la output/

  test-lab3:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./lab3
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Lab 3 tests
      working-directory: ./lab3/pipeline
      run: |
        python -m pytest tests -v
    
    - name: Run Lab 3 pipeline
      working-directory: ./lab3/pipeline
      run: |
        python main.py
        ls -la ../output/

  test-lab2:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install dependencies
      working-directory: ./lab2
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Lab 2 tests
      working-directory: ./lab2/pipeline
      run: |
        python -m pytest tests -v
    
    - name: Run Lab 2 pipeline
      working-directory: ./lab2/pipeline
      run: |
        python main.py
        ls -la ../output/

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 lab1 lab2 lab3 --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 lab1 lab2 lab3 --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: |
        black --check lab1 lab2 lab3 || true
